<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--surface-bg); }
  #root { padding: 30px 32px; display: flex; flex-direction: column; gap: 22px; }
  .glabel { font-family: var(--font-body); font-size: 11px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
  const { MythFact, Card } = window.SmallPClubDesignSystem_be2c74;
  function Demo() {
    return (
      <div>
        <div>
          <div className="glabel">MythFact · the core content unit</div>
          <MythFact
            myth="Size defines masculinity."
            fact="Confidence is built in the mind, not measured."
            source="Journal of Sex Research, 2015"
            layout="row"
          />
        </div>
        <div>
          <div className="glabel">Card · surfaces</div>
          <div className="cards">
            <Card variant="raised" radius="lg">
              <div style={{ fontFamily: "var(--font-display)", fontSize: 20, color: "var(--text-strong)", letterSpacing: "-0.01em" }}>raised</div>
              <p style={{ margin: "8px 0 0", fontSize: 14, color: "var(--text-muted)" }}>Paper surface, soft warm shadow.</p>
            </Card>
            <Card variant="deep" radius="lg">
              <div style={{ fontFamily: "var(--font-display)", fontSize: 20, letterSpacing: "-0.01em" }}>deep</div>
              <p style={{ margin: "8px 0 0", fontSize: 14, opacity: 0.85 }}>Dark turquoise counterpoint.</p>
            </Card>
            <Card variant="accent" radius="lg">
              <div style={{ fontFamily: "var(--font-display)", fontSize: 20, letterSpacing: "-0.01em" }}>accent</div>
              <p style={{ margin: "8px 0 0", fontSize: 14, opacity: 0.8 }}>Turquoise pulse, used sparingly.</p>
            </Card>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
